<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>مزرعة البكسل 🌾</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@700;800;900&display=swap');
:root{
  --gold:#f2c040;--goldd:#c09010;--dark:#0c0600;--dark2:#180c00;
  --bord:#7a3800;--green:#38c840;--blue:#3888e0;--red:#e03830;--purp:#b040c8;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--dark);font-family:'Tajawal',sans-serif;}
body{display:flex;flex-direction:column;}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;display:block;}

/* ROTATE */
#rot{display:none;position:fixed;inset:0;background:#060300;z-index:9999;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
#rot .ic{font-size:52px;animation:rspin 1.8s linear infinite;}
@keyframes rspin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
#rot p{color:var(--gold);font-size:18px;font-weight:900;text-shadow:2px 2px 0 #6a3800;}
@media(orientation:portrait){#rot{display:flex;}}

/* HUD */
#hud{
  height:42px;flex-shrink:0;
  background:linear-gradient(180deg,var(--dark2),var(--dark));
  border-bottom:2px solid var(--bord);
  display:flex;align-items:center;padding:0 5px;gap:3px;
  overflow-x:auto;overflow-y:hidden;scrollbar-width:none;
}
#hud::-webkit-scrollbar{display:none;}
.ht{font-size:13px;font-weight:900;color:var(--gold);text-shadow:1px 1px 0 #7a3800;white-space:nowrap;flex-shrink:0;}
.hs{width:1px;height:22px;background:#7a380038;flex-shrink:0;margin:0 2px;}
.hc{display:flex;align-items:center;gap:3px;border:1px solid #4a2600;padding:2px 5px;font-size:10px;font-weight:800;color:#f0e8c0;white-space:nowrap;flex-shrink:0;}
#hszn{padding:2px 6px;border:1px solid;font-size:9px;font-weight:800;white-space:nowrap;flex-shrink:0;}
.xr{width:40px;height:5px;background:#0c050038;border:1px solid #4a2600;}
.xf{height:100%;transition:width .3s;}
.er{width:36px;height:5px;background:#0c050038;border:1px solid #4a2600;}
.ef{height:100%;transition:width .3s;}
.hbtn{padding:2px 7px;border:1px solid;font-family:'Tajawal',sans-serif;font-size:9px;font-weight:800;cursor:pointer;background:transparent;white-space:nowrap;flex-shrink:0;transition:filter .1s;}
.hbtn:active{filter:brightness(1.5);}
.hbtn.y{border-color:#7a4800;color:var(--gold);}
.hbtn.g{border-color:#286000;color:#48b828;}
.hbtn.b{border-color:#00306a;color:#3888e0;}
.hbtn.p{border-color:#580050;color:#b040c8;}

/* WORLD */
#world{flex:1;position:relative;overflow:hidden;min-height:0;touch-action:none;}
#gc,#cc{position:absolute;top:0;left:0;}
#cc{pointer-events:none;}
#wxl{position:absolute;inset:0;pointer-events:none;z-index:15;overflow:hidden;}
.rd{position:absolute;width:2px;background:linear-gradient(180deg,transparent,#88aade68);animation:rf linear infinite;}
@keyframes rf{from{transform:translateY(-20px)}to{transform:translateY(110vh)}}
.sf{position:absolute;color:#cce8ff48;animation:sfall linear infinite;}
@keyframes sfall{from{transform:translateY(-20px)rotate(0)}to{transform:translateY(110vh)rotate(360deg)}}

/* STATUS */
#stbar{position:absolute;bottom:98px;left:50%;transform:translateX(-50%);pointer-events:none;z-index:30;}
#stchip{background:#0c050095;border:1px solid #6a3800;padding:2px 10px;font-size:9px;font-weight:800;color:#b08040;white-space:nowrap;}

/* TOOLBAR */
#tb{height:96px;flex-shrink:0;background:linear-gradient(0deg,var(--dark2),var(--dark));border-top:2px solid var(--bord);display:flex;flex-direction:column;}
#tr1{display:flex;align-items:center;padding:3px 5px 2px;gap:2px;border-bottom:1px solid #3a1800;flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
#tr1::-webkit-scrollbar{display:none;}
#tr2{display:flex;align-items:center;padding:2px 5px 3px;gap:2px;flex:1;overflow-x:auto;scrollbar-width:none;}
#tr2::-webkit-scrollbar{display:none;}
.trl{font-size:8px;font-weight:800;color:#6a3800;white-space:nowrap;flex-shrink:0;}
.tsep{width:1px;height:42px;background:#3a1800;flex-shrink:0;margin:0 2px;}

.tbtn{display:flex;flex-direction:column;align-items:center;gap:1px;background:transparent;border:2px solid #2a1200;padding:2px 3px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:7px;font-weight:800;color:#906030;min-width:36px;flex-shrink:0;transition:border-color .1s,background .1s;}
.tbtn:active,.tbtn.sel{border-color:var(--gold);background:#3a2000;color:var(--gold);}
.sbtn{display:flex;flex-direction:column;align-items:center;gap:1px;background:transparent;border:2px solid #2a1200;padding:2px 2px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:6px;font-weight:800;color:#906030;min-width:30px;flex-shrink:0;position:relative;transition:border-color .1s;}
.sbtn:active,.sbtn.sel{border-color:var(--gold);background:#2a1800;color:var(--gold);}
.sbtn.off{opacity:.32;}
.scnt{position:absolute;top:0px;right:1px;font-size:7px;color:var(--gold);font-weight:900;}
.xbtn{display:flex;flex-direction:column;align-items:center;gap:1px;background:transparent;border:1px solid;padding:2px 5px;cursor:pointer;font-family:'Tajawal',sans-serif;font-size:7px;font-weight:800;flex-shrink:0;transition:filter .1s;white-space:nowrap;}
.xbtn:active{filter:brightness(1.5);}
.xbtn.g{border-color:#285000;color:#48b028;}
.xbtn.y{border-color:#5a3800;color:#d09020;}
.xbtn.r{border-color:#4a1000;color:#c82820;}
.xbtn.b{border-color:#003870;color:#3888e0;}
.xbtn.p{border-color:#500050;color:#a830b8;}

/* MODAL */
.mov{display:none;position:fixed;inset:0;background:#000000a8;z-index:200;align-items:center;justify-content:center;padding:6px;}
.mov.on{display:flex;}
.mbox{background:#0e0800;border:2px solid var(--gold);padding:10px;width:100%;max-width:480px;max-height:calc(100vh - 12px);overflow-y:auto;display:flex;flex-direction:column;}
.mbox::-webkit-scrollbar{width:3px;}.mbox::-webkit-scrollbar-thumb{background:#3a2000;}
.mbox h2{color:var(--gold);font-size:13px;text-align:center;margin-bottom:7px;text-shadow:1px 1px 0 #7a4000;flex-shrink:0;}
.mtabs{display:flex;flex-wrap:wrap;border-bottom:1px solid #3a1800;margin-bottom:6px;flex-shrink:0;}
.mtab{flex:1;min-width:40px;padding:3px 2px;background:transparent;border:none;color:#6a4020;font-family:'Tajawal',sans-serif;font-size:8px;font-weight:800;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;}
.mtab.sel{color:var(--gold);border-bottom-color:var(--gold);}
.mpane{display:none;flex:1;overflow-y:auto;}.mpane.on{display:block;}
.mpane::-webkit-scrollbar{width:3px;}.mpane::-webkit-scrollbar-thumb{background:#3a2000;}
.mrow{display:flex;align-items:center;justify-content:space-between;padding:4px 2px;border-bottom:1px solid #1c1000;}
.mrl{display:flex;align-items:center;gap:5px;flex:1;min-width:0;}
.mi .mn{font-size:10px;font-weight:800;color:#f0e8c0;}
.mi .ms{font-size:8px;color:#6a4020;}
.gbtn{background:transparent;border:2px solid var(--gold);color:var(--gold);font-family:'Tajawal',sans-serif;font-size:9px;font-weight:800;padding:2px 7px;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.gbtn:active{background:var(--gold);color:#000;}
.gbtn:disabled{opacity:.22;cursor:not-allowed;border-color:#3a2000;color:#3a2000;}
.gbtn.g{border-color:#30b028;color:#30b028;}.gbtn.g:active{background:#30b028;color:#000;}
.gbtn.r{border-color:#c82820;color:#c82820;}.gbtn.r:active{background:#c82820;color:#fff;}
.mcard{background:#181000;border:1px solid #3a1800;padding:6px;margin:3px 0;}
.mcard-h{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.mn2{font-size:11px;font-weight:800;color:#f0e8c0;}
.ms2{font-size:8px;color:#6a4020;}
.mbar{height:4px;background:#0e0800;border:1px solid #2a1400;margin:2px 0;}
.mbar-f{height:100%;transition:width .3s;}
.mtit{font-size:9px;font-weight:800;color:var(--gold);text-align:center;padding:4px 0;border-bottom:1px solid #3a1800;margin:5px 0 3px;}
.mcl{display:block;width:100%;margin-top:8px;padding:6px;background:#181000;border:1px solid #3a1800;color:#6a4020;font-family:'Tajawal',sans-serif;font-size:11px;cursor:pointer;flex-shrink:0;}
.mcl:active{border-color:var(--gold);color:var(--gold);}

/* NOTIFS */
#nfs{position:fixed;top:48px;left:50%;transform:translateX(-50%);z-index:600;display:flex;flex-direction:column;gap:2px;align-items:center;pointer-events:none;}
.np{background:#0e0800ee;border:2px solid var(--gold);padding:3px 10px;font-size:10px;font-weight:800;color:var(--gold);animation:nI .18s,nO .25s 2s forwards;}
@keyframes nI{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
@keyframes nO{from{opacity:1}to{opacity:0}}

/* LEVELUP */
#lvlmod .lbig{font-size:52px;font-weight:900;color:var(--gold);text-align:center;text-shadow:3px 3px 0 #7a4000;animation:pop .38s;}
@keyframes pop{0%{transform:scale(.15)}60%{transform:scale(1.18)}100%{transform:scale(1)}}
</style>
</head>
<body>

<!-- ROTATE NOTICE -->
<div id="rot">
  <div class="ic">📱</div>
  <p>أدر جهازك أفقياً للعب!</p>

</div>

<div id="hud">

  <div class="hc">📅<b id="hday">1</b></div>
  <div id="hszn">🌸 ربيع</div>
  <div class="hc">⭐<b id="hlv">1</b><div class="xr"><div class="xf" id="xpb" style="width:0%;background:#f2c040;"></div></div></div>
  <div class="hc">⚡<b id="hen">100</b><div class="er"><div class="ef" id="enb" style="width:100%;background:#38c840;"></div></div></div>
  <div class="hs"></div>
  <button class="hbtn y" onclick="openM('shop','seeds')">🌱 بذور</button>
  <button class="hbtn y" onclick="openM('shop','inv')">🧺 مخزون</button>
  <button class="hbtn p" onclick="openM('shop','craft')">🏭 تصنيع</button>
  <button class="hbtn b" onclick="openM('farm','animals')">🐄 حيوانات</button>
  <button class="hbtn b" onclick="openM('farm','build')">🏗 مبانٍ</button>
  <button class="hbtn b" onclick="openM('farm','skills')">⭐ مهارات</button>
  <button class="hbtn b" onclick="openM('farm','wx')">🌤 طقس</button>
  <button class="hbtn b" onclick="openM('farm','stats')">📊 إحصائيات</button>

  <button class="hbtn g" onclick="nextDay()">⏭ التالي</button>
</div>

    <button class="tbtn"     id="tb-harvest"   onclick="selT('harvest')">  <canvas id="ti-har"  width="20" height="20"></canvas>حصاد</button>
    <button class="tbtn"     id="tb-fertilize" onclick="selT('fertilize')"><canvas id="ti-fer"  width="20" height="20"></canvas>سماد</button>
    <button class="tbtn"     id="tb-plow"      onclick="selT('plow')">     <canvas id="ti-plo"  width="20" height="20"></canvas>إزالة</button>
    <div class="tsep"></div>

    <button class="xbtn b" onclick="openM('farm','build')">🏗 مبانٍ</button>
    <button class="xbtn b" onclick="openM('farm','skills')">⭐ مهارات</button>
    <button class="xbtn b" onclick="openM('farm','wx')">🌤 طقس</button>
    <button class="xbtn b" onclick="openM('shop','expand')">🌍 توسعة</button>
  </div>
  <div id="tr2">

    <div id="sbtns" style="display:flex;gap:2px;"></div>
  </div>
</div>

<!-- SHOP MODAL -->
<div class="mov" id="shopmod">
  <div class="mbox">
    <h2>🏪 السوق</h2>
    <div class="mtabs">
      <button class="mtab sel" onclick="mTab('shop','seeds')">🌱 بذور</button>
      <button class="mtab"     onclick="mTab('shop','inv')">🧺 مخزون</button>
      <button class="mtab"     onclick="mTab('shop','craft')">🏭 تصنيع</button>
      <button class="mtab"     onclick="mTab('shop','expand')">🌍 توسعة</button>
      <button class="mtab"     onclick="mTab('shop','extras')">🧪 مستلزمات</button>
    </div>
    <div class="mpane on" id="sp-seeds"></div>
    <div class="mpane"    id="sp-inv"></div>
    <div class="mpane"    id="sp-craft"></div>
    <div class="mpane"    id="sp-expand"></div>
    <div class="mpane"    id="sp-extras"></div>
    <button class="mcl" onclick="closeM('shopmod')">✕ إغلاق</button>
  </div>
</div>

<!-- FARM MODAL -->
<div class="mov" id="farmmod">
  <div class="mbox">
    <h2>🐄 المزرعة</h2>
    <div class="mtabs">
      <button class="mtab sel" onclick="mTab('farm','animals')">🐄 حيوانات</button>
      <button class="mtab"     onclick="mTab('farm','build')">🏗 مبانٍ</button>
      <button class="mtab"     onclick="mTab('farm','skills')">⭐ مهارات</button>
      <button class="mtab"     onclick="mTab('farm','wx')">🌤 طقس</button>
      <button class="mtab"     onclick="mTab('farm','stats')">📊 إحصائيات</button>
    </div>
    <div class="mpane on" id="fp-animals"></div>
    <div class="mpane"    id="fp-build"></div>
    <div class="mpane"    id="fp-skills"></div>
    <div class="mpane"    id="fp-wx"></div>
    <div class="mpane"    id="fp-stats"></div>
    <button class="mcl" onclick="closeM('farmmod')">✕ إغلاق</button>
  </div>
</div>

<!-- LEVELUP -->
<div class="mov" id="lvlmod">
  <div class="mbox" style="max-width:260px;text-align:center;">
    <div style="font-size:26px">🎉</div>

    <button class="mcl" onclick="closeM('lvlmod')">رائع! تابع</button>
  </div>
</div>

<div id="nfs"></div>

function gS(n){if(SC[n])return SC[n];const da=SP[n];if(!da)return null;const cv=document.createElement('canvas');cv.width=8;cv.height=8;const cx=cv.getContext('2d');for(let i=0;i<da.length;i++){let c=da[i];if(!c)continue;if(c==='1')c='#2e1a0a';if(c==='2')c='#1e1006';cx.fillStyle=c;cx.fillRect(i%8,Math.floor(i/8),1,1);}return SC[n]=cv;}

function initGrid(keep=false){

    grid[r]=[];
    for(let c=0;c<S.COLS;c++)

const gc=document.getElementById('gc'),gx=gc.getContext('2d');
const cc=document.getElementById('cc'),cx2=cc.getContext('2d');

function resize(){
  const wr=document.getElementById('world');
  const W=wr.clientWidth,H=wr.clientHeight;
  gc.width=cc.width=W; gc.height=cc.height=H;
  CS=Math.min(
    Math.floor((W-56)/(S.COLS+2.5)),
    Math.floor((H-14)/(S.ROWS+1.5)),
    96
  );
  CS=Math.max(CS,32);
  OX=Math.floor((W-S.COLS*CS)/2);
  OY=Math.floor((H-S.ROWS*CS)/2);
}

// ════════════════════════════════════════════════
//  RENDER LOOP
// ════════════════════════════════════════════════
function loop(){
  const W=gc.width,H=gc.height;
  gx.clearRect(0,0,W,H);
  const szn=SEASONS[S.si];
  // sky gradient
  const grd=gx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,szn.s1);grd.addColorStop(1,szn.s2);
  gx.fillStyle=grd;gx.fillRect(0,0,W,H);
  const Sp=Math.max(1,Math.round(CS/8));
  const lx=OX, rx=OX+S.COLS*CS;
  // ground
  gx.fillStyle='#1a6010';gx.fillRect(0,OY+S.ROWS*CS,W,H);
  // trees & house
  dS(gx,'tree',lx-CS-2,OY+S.ROWS*CS-CS,Sp);
  dS(gx,'tree',lx-Math.round(CS*.5),OY+S.ROWS*CS-Math.round(CS*.72),Math.round(Sp*.8));
  dS(gx,'house',rx+6,OY+2,Sp);
  // buildings appear on world
  Object.entries(BUILDINGS).forEach(([id,bd])=>{
    if(!S.built[id])return;
    const bx=bd.wx<0 ? lx+Math.round(bd.wx*lx*2) : rx+Math.round(bd.wx*(W-rx));
    const by=OY+Math.round(bd.wy*H);
    gx.fillStyle='#00000025';gx.fillRect(bx+2,by+8*Sp+2,8*Sp,3);
    dS(gx,bd.sp,bx,by,Sp);
    gx.fillStyle='#f2c040bb';gx.font=`bold ${Math.max(6,Math.round(Sp*1.9))}px Tajawal`;
    gx.textAlign='center';gx.fillText(bd.n,bx+4*Sp,by+8*Sp+10);gx.textAlign='left';
  });
  // animals near barn
  if(S.built.barn&&S.animals.length){
    const bd=BUILDINGS.barn;
    const bx=lx+Math.round(bd.wx*lx*2);
    const by=OY+Math.round(bd.wy*H);
    S.animals.forEach((a,i)=>{
      const tt=Date.now()/900+i*2.2;
      dS(gx,ANIMALS[a.type].sp,
        bx+8*Sp+3+Math.round(Math.sin(tt)*13)+i*10,
        by+8*Sp-3+Math.round(Math.cos(tt*.62)*7),
        Math.max(1,Math.round(Sp*.84)));
    });
  }
  // grid
  for(let r=0;r<S.ROWS;r++)for(let c=0;c<S.COLS;c++)drawCell(OX+c*CS,OY+r*CS,grid[r][c],Sp);
  // particles
  for(let i=parts.length-1;i>=0;i--){
    const p=parts[i];gx.globalAlpha=p.life/p.maxLife;
    dS(gx,p.sp,Math.round(p.x),Math.round(p.y),Math.max(1,Math.round(CS/10)));
    p.x+=p.vx;p.y+=p.vy;p.life--;if(p.life<=0)parts.splice(i,1);
  }
  gx.globalAlpha=1;
  // cursor
  cx2.clearRect(0,0,W,H);
  const hc=Math.floor((mx-OX)/CS),hr=Math.floor((my-OY)/CS);
  if(hc>=0&&hc<S.COLS&&hr>=0&&hr<S.ROWS){
    cx2.strokeStyle='#f2c040';cx2.lineWidth=2;cx2.strokeRect(OX+hc*CS+1,OY+hr*CS+1,CS-2,CS-2);
    const ts=toolSp();
    if(ts){cx2.globalAlpha=.5;dS(cx2,ts,OX+hc*CS+CS-Math.round(CS*.35),OY+hr*CS+CS-Math.round(CS*.35),Math.max(1,Math.round(CS/10)));cx2.globalAlpha=1;}
  }
  requestAnimationFrame(loop);
}
function toolSp(){return{hoe:'hoe',water:'watercan',seed:S.seed,harvest:'basket',fertilize:'fertilize',plow:'remove'}[S.tool]||null;}

function drawCell(x,y,cell,Sp){
  gx.imageSmoothingEnabled=false;
  if(cell.t==='grass'){
    dS(gx,'grass',x,y,Sp);
    gx.strokeStyle='#18500820';gx.lineWidth=1;gx.strokeRect(x,y,CS,CS);
    return;
  }
  if(cell.wet){
    for(let i=0;i<64;i++){gx.fillStyle=i%2===0?'#2e1a0a':'#1e1006';gx.fillRect(x+(i%8)*Sp,y+Math.floor(i/8)*Sp,Sp,Sp);}
    gx.fillStyle='#4488cc0e';gx.fillRect(x,y,CS,CS);
  }else dS(gx,'soil',x,y,Sp);
  if(cell.fert){gx.fillStyle='#40c0400e';gx.fillRect(x,y,CS,CS);}
  gx.strokeStyle='#2a140040';gx.lineWidth=1;gx.strokeRect(x,y,CS,CS);
  if(cell.crop){
    const cd=CROPS[cell.crop],prog=Math.min(cell.days/Math.max(1,cd.gd),1),rdy=prog>=1;
    const sc2=Math.max(1,Math.round(rdy?Sp:(Sp*.18+Sp*.82*prog)));
    dS(gx,cd.sp,x+Math.round((CS-8*sc2)/2),y+Math.round((CS-8*sc2)/2),sc2);
    const bx=x+3,by=y+CS-6,bw=CS-6,bh=3;
    gx.fillStyle='#00000058';gx.fillRect(bx,by,bw,bh);
    gx.fillStyle=rdy?'#40ff40':(cell.fert?'#40e060':'#f2c040');gx.fillRect(bx,by,bw*prog,bh);
    if(rdy){gx.strokeStyle='#80ff8060';gx.lineWidth=2;gx.strokeRect(x+1,y+1,CS-2,CS-2);}
  }
}

  [gc,cc].forEach(el=>{
    el.addEventListener('mousemove',e=>{const r=el.getBoundingClientRect();mx=e.clientX-r.left;my=e.clientY-r.top;});
    el.addEventListener('click',e=>{const r=el.getBoundingClientRect();hit(Math.floor((e.clientY-r.top-OY)/CS),Math.floor((e.clientX-r.left-OX)/CS));});
    el.addEventListener('touchstart',e=>{const r=el.getBoundingClientRect();const t=e.touches[0];mx=t.clientX-r.left;my=t.clientY-r.top;},{passive:true});
    el.addEventListener('touchend',e=>{e.preventDefault();const r=el.getBoundingClientRect();const t=e.changedTouches[0];hit(Math.floor((t.clientY-r.top-OY)/CS),Math.floor((t.clientX-r.left-OX)/CS));},{passive:false});
  });
}

function hit(row,col){
  if(col<0||col>=S.COLS||row<0||row>=S.ROWS)return;
  const cell=grid[row][col];
  const px=OX+col*CS+CS/2,py=OY+row*CS+CS/2;
  switch(S.tool){
    case'hoe':
      if(cell.t!=='grass'){setSt('مُحرَثة بالفعل');return;}
      if(!useE(5))return;
      cell.t='soil';spawnP(px,py,'soil',3);addXP(2);setSt('✅ تم الحرث');break;
    case'seed':{
      if(cell.t!=='soil'){setSt('احرث أولاً!');return;}
      if(cell.crop){setSt('مزروعة بالفعل!');return;}
      const sid=S.seed;
      if(!(S.seeds[sid]>0)){setSt('لا بذور! اشترِ من السوق');return;}
      const cd=CROPS[sid];
      if(!S.built.greenhouse&&!cd.sz.includes(SEASONS[S.si].id)){setSt(`⚠️ ${cd.n} لا تنمو الآن`);return;}
      if(!useE(Math.max(1,3-Math.floor(S.skills.watering/2))))return;
      cell.crop=sid;cell.days=0;cell.fert=false;S.seeds[sid]--;
      spawnP(px,py,cd.sp,3);addXP(cd.xp/2);setSt(`🌱 زُرع ${cd.n}`);break;}
    case'water':
      if(cell.t!=='soil'){setSt('لا تحتاج ري');return;}
      if(cell.wet){setSt('مرويّة بالفعل');return;}
      {let ec=Math.max(1,2-Math.floor(S.skills.watering/2));
      if(S.freeW>0){ec=0;S.freeW--;notify('🪣 ري مجاني!');}
      if(ec>0&&!useE(ec))return;
      cell.wet=true;spawnP(px,py,'watercan',3);addXP(1);setSt('💧 تم الري');break;}
    case'harvest':
      if(!cell.crop){setSt('لا محصول هنا');return;}
      {const cd=CROPS[cell.crop];
      if(cell.days<cd.gd){setSt(`⏳ ${cd.gd-Math.floor(cell.days)} أيام متبقية`);return;}
      if(!useE(4))return;
      const cnt=1+S.skills.farming+(Math.random()<.3?1:0);
      addInv(cell.crop,cnt);spawnP(px,py,cd.sp,6);addXP(cd.xp);S.stats.harvested+=cnt;
      setSt(`🧺 ${cnt}×${cd.n}!`);cell.crop=null;cell.days=0;cell.wet=false;cell.fert=false;break;}
    case'fertilize':
      if(cell.t!=='soil'||!cell.crop){setSt('يحتاج نبتة مزروعة');return;}
      if(cell.fert){setSt('مُسمَّدة بالفعل');return;}
      if(!(S.inv.fertilizer>0)){setSt('لا سماد! اشترِ من المستلزمات');return;}
      if(!useE(4))return;
      cell.fert=true;S.inv.fertilizer--;cell.days=Math.min(cell.days+2,CROPS[cell.crop].gd);
      spawnP(px,py,'fertilize',4);setSt('💚 تسميد!');break;
    case'plow':
      if(cell.t==='grass'){setSt('لا شيء لإزالته');return;}
      if(!useE(2))return;
      if(cell.crop){cell.crop=null;cell.days=0;setSt('🔄 أُزيلت النبتة');}
      else{cell.t='grass';cell.wet=false;setSt('🔄 أُزيلت التربة');}break;
  }
  updSeedBar();
}

// ════════════════════════════════════════════════
//  ENERGY / XP / DAY
// ════════════════════════════════════════════════
function useE(a){if(S.energy<a){notify('⚡ طاقة غير كافية!');return false;}S.energy-=a;updHUD();return true;}
function addXP(v){
  S.xp+=v;
  while(S.xp>=S.xpN){S.xp-=S.xpN;S.lv++;S.skPts++;S.maxE=100+S.lv*5;S.xpN=Math.floor(100*Math.pow(1.35,S.lv-1));
    document.getElementById('lvlnum').textContent=S.lv;document.getElementById('lvlbns').textContent=`الطاقة: ${S.maxE}`;
    document.getElementById('lvlmod').classList.add('on');}
  updHUD();
}

function nextDay(){
  S.day++;S.dis++;S.stats.days++;
  if(S.dis>S.dps){S.dis=1;S.si=(S.si+1)%4;notify(`${SEASONS[S.si].ic} ${SEASONS[S.si].n}!`);}
  let cum=0;const roll=Math.random();
  for(const[wid,wc]of Object.entries(SEASONS[S.si].wx)){cum+=wc;if(roll<=cum){S.wx=wid;break;}}
  const wxd=WX[S.wx];
  if(wxd.aw){for(let r=0;r<S.ROWS;r++)for(let c=0;c<S.COLS;c++)if(grid[r][c].t==='soil')grid[r][c].wet=true;notify('🌧️ المطر روى الكل!');}
  let grew=0;const szn=SEASONS[S.si];
  for(let r=0;r<S.ROWS;r++){for(let c=0;c<S.COLS;c++){const cell=grid[r][c];if(cell.crop&&cell.wet){const mod=szn.gm+wxd.b+(cell.fert?.3:0);if(mod>0){cell.days+=Math.max(.2,mod);grew++;}}if(S.wx!=='rain')cell.wet=false;}}
  S.freeW=S.built.well?3:0;
  S.animals.forEach(a=>{
    const ad=ANIMALS[a.type];
    if(a.fed){a.dsp=(a.dsp||0)+1;a.happy=Math.min(100,a.happy+10);
      if(a.dsp>=ad.pd){const q=1+S.skills.tending;addInv(ad.prod,q);a.dsp=0;addXP(ad.xpd);notify(`${ad.pn}×${q} من ${a.n}!`);}}
    else a.happy=Math.max(0,a.happy-20);
    a.fed=false;
  });
  S.energy=S.maxE;
  updateWxFX();
  setSt(`📅 يوم ${S.day} — ${wxd.ic} ${wxd.n} — ${grew} نبتة نمت`);
  notify(`📅 يوم ${S.day} | ${SEASONS[S.si].ic} ${SEASONS[S.si].n}`);
  updHUD();updSeedBar();
  if(aMod==='farm')buildFT(aFT);
  if(aMod==='shop')buildST(aST);
}

// ════════════════════════════════════════════════
//  ACTIONS
// ════════════════════════════════════════════════
function addInv(id,n){S.inv[id]=(S.inv[id]||0)+n;}
function iVal(id){if(CROPS[id])return CROPS[id].sv;for(const a of Object.values(ANIMALS))if(a.prod===id)return a.pv;const c=CRAFTS.find(x=>x.id===id);if(c)return c.val;return 50;}
function iName(id){if(CROPS[id])return CROPS[id].n;for(const a of Object.values(ANIMALS))if(a.prod===id)return a.pn;const c=CRAFTS.find(x=>x.id===id);if(c)return c.n;return id;}
function iSp(id){if(CROPS[id])return CROPS[id].sp;for(const[,a]of Object.entries(ANIMALS))if(a.prod===id)return a.ps;const c=CRAFTS.find(x=>x.id===id);if(c)return c.sp;return 'coin';}
function sellMult(){return(S.built.market?1.3:1)*(1+S.skills.trading*.1);}
function sellItem(id){const cnt=S.inv[id];if(!cnt)return;const e=Math.floor(iVal(id)*cnt*sellMult());S.money+=e;delete S.inv[id];addXP(cnt*2);S.stats.earned+=e;notify(`💰 ${cnt}×${iName(id)} = ${e}ذ`);updHUD();buildST('inv');}
function sellAll(){let t=0;for(const[id]of Object.entries(S.inv)){t+=Math.floor(iVal(id)*S.inv[id]*sellMult());}if(!t){notify('المخزون فارغ');return;}S.stats.earned+=t;S.money+=t;S.inv={};notify(`💰 ${t}ذ بعت الكل!`);updHUD();}
function doCraft(id){const c=CRAFTS.find(x=>x.id===id);if(!c)return;if(c.bld&&!S.built[c.bld]){notify(`تحتاج ${BUILDINGS[c.bld].n}!`);return;}if(c.sk)for(const[sk,lv]of Object.entries(c.sk)){if((S.skills[sk]||0)<lv){notify(`مهارة ${SKDEF.find(s=>s.id===sk)?.n} مست ${lv}`);return;}}for(const[ing,amt]of Object.entries(c.needs)){if((S.inv[ing]||0)<amt){notify(`لا يكفي ${iName(ing)}`);return;}}for(const[ing,amt]of Object.entries(c.needs)){S.inv[ing]-=amt;if(!S.inv[ing])delete S.inv[ing];}addInv(c.id,1);notify(`✅ ${c.n}!`);addXP(20);S.stats.crafted++;updHUD();buildST('craft');}
function buildStr(id){const bd=BUILDINGS[id];if(S.built[id]){notify('مبني بالفعل!');return;}if(S.money<bd.cost){notify('💸 لا يكفي!');return;}S.money-=bd.cost;S.built[id]=true;if(id==='well')S.freeW=3;notify(`✅ ${bd.n} يظهر في العالم!`);addXP(40);updHUD();buildFT('build');}
function addAnimal(type){const ad=ANIMALS[type];if(!S.built.barn){notify('ابنِ الحظيرة أولاً!');return;}if(S.money<ad.cost){notify('💸 لا يكفي!');return;}S.money-=ad.cost;S.animals.push({type,n:ad.n+(S.animals.filter(a=>a.type===type).length+1),happy:80,fed:false,dsp:0});notify(`${ad.n} مرحباً!`);addXP(15);updHUD();buildFT('animals');}
function feedAnimal(i){const a=S.animals[i],ad=ANIMALS[a.type];if((S.inv[ad.feed]||0)<ad.fa){notify(`لا يكفي ${iName(ad.feed)}`);return;}S.inv[ad.feed]-=ad.fa;if(!S.inv[ad.feed])delete S.inv[ad.feed];a.fed=true;a.happy=Math.min(100,a.happy+15);notify(`${a.n} مُغذَّى!`);buildFT('animals');}
function upgSk(id){const sk=SKDEF.find(s=>s.id===id);if(!sk)return;if(S.skPts<=0){notify('لا نقاط مهارة!');return;}if(S.skills[id]>=sk.max){notify('الحد الأقصى');return;}S.skills[id]++;S.skPts--;notify(`⭐ ${sk.n} مستوى ${S.skills[id]}`);updHUD();buildFT('skills');}
function waterAll(){if(!useE(20))return;let n=0;for(let r=0;r<S.ROWS;r++)for(let c=0;c<S.COLS;c++)if(grid[r][c].t==='soil'&&!grid[r][c].wet){grid[r][c].wet=true;n++;}notify(`💧 روَّيت ${n} قطعة!`);}
function harvestAll(){if(!useE(20))return;let n=0;for(let r=0;r<S.ROWS;r++){for(let c=0;c<S.COLS;c++){const cell=grid[r][c];if(cell.crop&&cell.days>=CROPS[cell.crop].gd){const cnt=1+S.skills.farming;addInv(cell.crop,cnt);addXP(CROPS[cell.crop].xp);S.stats.harvested+=cnt;cell.crop=null;cell.days=0;cell.wet=false;cell.fert=false;n++;}}}notify(n?`🧺 ${n} محصول!`:'لا ناضج بعد');updHUD();}
function buySeed(id,q){const cd=CROPS[id],cost=cd.sc*q;if(S.money<cost){notify('💸 لا يكفي!');return;}S.money-=cost;S.seeds[id]=(S.seeds[id]||0)+q;notify(`🌱 ${q}×${cd.n}`);updHUD();updSeedBar();buildST('seeds');}
function buyItem(id,q,price){if(S.money<price){notify('💸 لا يكفي!');return;}S.money-=price;addInv(id,q);notify(`✅ ${q}×${iName(id)}`);updHUD();}
function expandFarm(n,cost,isRow=false){if(S.money<cost){notify('💸 لا يكفي!');return;}S.money-=cost;if(isRow){if(S.ROWS>=8){notify('الحد الأقصى 8 صفوف');return;}S.ROWS++;}else{S.COLS=Math.min(S.COLS+n,22);}initGrid(true);resize();notify('🌍 المزرعة اتسعت!');updHUD();}

function updHUD(){

function updSeedBar(){
  const sb=document.getElementById('sbtns');sb.innerHTML='';

function row(l,btn){const d=document.createElement('div');d.className='mrow';d.appendChild(l);d.appendChild(btn);return d;}
function mrl(sp,n,s){const d=document.createElement('div');d.className='mrl';d.appendChild(mkSp(sp,3));const mi=document.createElement('div');mi.className='mi';mi.innerHTML=`<div class="mn">${n}</div><div class="ms">${s}</div>`;d.appendChild(mi);return d;}
function gbtn(lbl,fn,cls=''){const b=document.createElement('button');b.className='gbtn '+(cls||'');b.textContent=lbl;b.onclick=fn;return b;}

function buildST(t){

  if(t==='seeds'){

    const sb2=document.createElement('button');sb2.className='gbtn r';sb2.style.width='80%';sb2.textContent='💸 بيع كل شيء';sb2.onclick=()=>{sellAll();buildST('inv');};d2.appendChild(sb2);el.appendChild(d2);
  }else if(t==='craft'){

      let sub=c.desc+` → 💰${c.val}`;

      const b2=gbtn('صنع',()=>doCraft(c.id));b2.disabled=locked||!canC;
      const r2=row(mrl(c.sp,c.n,sub),b2);r2.style.opacity=locked?'.4':'1';el.appendChild(r2);
    });
  }else if(t==='expand'){
    const el=document.getElementById('sp-expand');el.innerHTML='<div class="mtit">🌍 توسعة المزرعة</div>';
    const curr=`الآن: ${S.COLS}×${S.ROWS}`;
    [[2,500,'أعمدة +2'],[4,1200,'أعمدة +4'],[6,2500,'أعمدة +6']].forEach(([n,cost,name])=>{
      const l=document.createElement('div');l.className='mrl';l.innerHTML=`<span style="font-size:18px;flex-shrink:0">🌍</span>`;
      const mi=document.createElement('div');mi.className='mi';mi.innerHTML=`<div class="mn">${name}</div><div class="ms">${curr}</div>`;l.appendChild(mi);
      el.appendChild(row(l,gbtn(`💰${cost}`,()=>expandFarm(n,cost))));
    });
    const l2=document.createElement('div');l2.className='mrl';l2.innerHTML=`<span style="font-size:18px;flex-shrink:0">🌾</span>`;
    const mi2=document.createElement('div');mi2.className='mi';mi2.innerHTML=`<div class="mn">صف +1</div><div class="ms">${curr}</div>`;l2.appendChild(mi2);
    el.appendChild(row(l2,gbtn('💰800',()=>expandFarm(0,800,true))));
  }else if(t==='extras'){
    const el=document.getElementById('sp-extras');el.innerHTML='<div class="mtit">🧪 مستلزمات</div>';
    [
      {sp:'fertilize',n:'سماد ×5',  desc:'يسرّع النمو +2 يوم',price:150,fn:()=>buyItem('fertilizer',5,150)},
      {sp:'watercan', n:'ري مجاني+3',desc:'+3 ريّات مجانية',price:60,fn:()=>{if(S.money<60){notify('💸');return;}S.money-=60;S.freeW+=3;notify('🪣 +3 ري');updHUD();}},
      {sp:'coin',     n:'طاقة +30', desc:'استعادة فورية',    price:100,fn:()=>{if(S.money<100){notify('💸');return;}S.money-=100;S.energy=Math.min(S.maxE,S.energy+30);notify('⚡ +30 طاقة');updHUD();}},
    ].forEach(it=>{el.appendChild(row(mrl(it.sp,it.n,it.desc),gbtn(`💰${it.price}`,it.fn)));});
  }
}

// ── FARM TABS ──
function buildFT(t){
  if(t==='animals'){
    const el=document.getElementById('fp-animals');el.innerHTML='';
    if(S.animals.length){
      el.innerHTML='<div class="mtit">🐄 حيواناتي</div>';
      S.animals.forEach((a,i)=>{
        const ad=ANIMALS[a.type];
        const card=document.createElement('div');card.className='mcard';
        const h=document.createElement('div');h.className='mcard-h';h.appendChild(mkSp(a.type,3));
        h.innerHTML+=`<div><div class="mn2">${a.n}</div><div class="ms2">${a.fed?'✅ مُغذَّى':'❌ جائع'} | سعادة:${a.happy}%</div></div>`;card.appendChild(h);
        const bar=document.createElement('div');bar.className='mbar';
        const fill=document.createElement('div');fill.className='mbar-f';fill.style.width=a.happy+'%';fill.style.background=a.happy>60?'#40c040':a.happy>30?'#f2c040':'#e04040';
        bar.appendChild(fill);card.appendChild(bar);
        const sub=document.createElement('div');sub.style.cssText='font-size:8px;color:#6a4020;margin:2px 0;';sub.textContent=`${ad.pn} بعد ${Math.max(0,ad.pd-(a.dsp||0))} يوم | طعامه: ${iName(ad.feed)} (لديك:${S.inv[ad.feed]||0})`;card.appendChild(sub);
        const fb=document.createElement('button');fb.className='gbtn';fb.style.cssText='width:100%;font-size:9px;';fb.textContent=`🌾 أطعم (${ad.fa}×${iName(ad.feed)})`;fb.onclick=()=>feedAnimal(i);card.appendChild(fb);
        el.appendChild(card);
      });
    }else el.innerHTML='<div style="text-align:center;color:#6a4020;padding:10px;font-size:10px">ابنِ الحظيرة ثم اشترِ حيوانات من أدناه</div>';
    el.innerHTML+=`<div class="mtit">🛒 شراء حيوانات</div>`;
    Object.entries(ANIMALS).filter(([,a])=>!a.ul||S.lv>=a.ul).forEach(([id,ad])=>{
      const r2=row(mrl(id,ad.n,`${ad.pn} كل ${ad.pd} يوم | طعام: ${iName(ad.feed)}`),gbtn(`💰${ad.cost}`,()=>addAnimal(id)));
      r2.style.opacity=S.built.barn?'1':'.4';el.appendChild(r2);
    });
    if(!S.built.barn)el.innerHTML+=`<div style="text-align:center;font-size:8px;color:#e04040;padding:4px;">⚠️ ابنِ الحظيرة أولاً من تبويب "مبانٍ"</div>`;
  }else if(t==='build'){
    const el=document.getElementById('fp-build');el.innerHTML='<div class="mtit">🏗 المنشآت — تظهر على الخريطة!</div>';
    Object.entries(BUILDINGS).forEach(([id,bd])=>{
      const built=!!S.built[id];
      const card=document.createElement('div');card.className='mcard';card.style.cssText='display:flex;align-items:center;gap:6px;';
      card.appendChild(mkSp(bd.sp,3));
      const info=document.createElement('div');info.style.flex='1';
      info.innerHTML=`<div class="mn2">${bd.n}</div><div class="ms2">${bd.desc}</div><div style="font-size:8px;color:${built?'#38c840':'#f2c040'};margin-top:2px">${built?'✅ مبني':'💰 '+bd.cost}</div>`;
      card.appendChild(info);
      const btn=document.createElement('button');btn.className='gbtn';btn.disabled=built;btn.textContent=built?'✅':'بناء';btn.onclick=()=>buildStr(id);card.appendChild(btn);
      el.appendChild(card);
    });
  }else if(t==='skills'){
    const el=document.getElementById('fp-skills');
    el.innerHTML=`<div class="mtit">⭐ المهارات</div><div style="text-align:center;padding:3px 0 7px;font-size:10px;color:#6a4020;">نقاط متاحة: <b style="color:#f2c040;font-size:16px;">${S.skPts}</b></div>`;
    SKDEF.forEach(sk=>{
      const lv=S.skills[sk.id]||0;
      const card=document.createElement('div');card.className='mcard';
      card.innerHTML=`<div style="display:flex;justify-content:space-between;margin-bottom:2px"><div style="font-size:10px;font-weight:800;color:#f0e8c0">${sk.n}</div><div style="font-size:9px;color:#f2c040;font-weight:900">${lv}/${sk.max}</div></div><div class="mbar"><div class="mbar-f" style="width:${lv/sk.max*100}%;background:${sk.col}"></div></div><div style="font-size:8px;color:#6a4020;margin-bottom:3px">${sk.desc}</div>`;
      const b=document.createElement('button');b.className='gbtn';b.style.width='100%';b.disabled=lv>=sk.max||S.skPts<=0;b.textContent=lv>=sk.max?'✅ الحد الأقصى':(S.skPts>0?'⬆ ترقية':'لا نقاط');b.onclick=()=>upgSk(sk.id);card.appendChild(b);el.appendChild(card);
    });
  }else if(t==='wx'){
    const el=document.getElementById('fp-wx');
    const wxd=WX[S.wx],szn=SEASONS[S.si];
    let html=`<div class="mcard" style="text-align:center">
      <div style="font-size:36px;margin:3px 0">${wxd.ic}</div>
      <div style="font-size:13px;font-weight:900;color:#f0e8c0">${wxd.n}</div>
      <div style="font-size:8px;color:#6a4020;margin-top:3px">نمو: <span style="color:#f2c040">${Math.round((szn.gm+wxd.b)*100)}%</span> | ري تلقائي: ${wxd.aw?'✅':'❌'} | بئر: <span style="color:#4080e0">${S.freeW}</span></div>
    </div>
    <div class="mtit">الفصول — يوم ${S.dis}/${S.dps}</div>
    <div style="display:flex;gap:2px;margin-bottom:5px">`;
    SEASONS.forEach((_,i)=>html+=`<div style="flex:1;height:5px;background:${i===S.si?'#f2c040':'#3a1800'}"></div>`);
    html+=`</div>`;
    SEASONS.forEach((ss,i)=>html+=`<div style="display:flex;align-items:center;gap:6px;padding:3px 0;font-size:9px;color:${i===S.si?'#f2c040':'#6a4020'};${i===S.si?'font-weight:900':''}">${ss.ic} ${ss.n}${i===S.si?' ← الآن':''}</div>`);
    html+=`<div class="mtit">محاصيل هذا الفصل</div><div style="display:flex;flex-wrap:wrap;gap:5px;padding:4px 0;">`;
    Object.values(CROPS).filter(cd=>cd.sz.includes(szn.id)).forEach(cd=>{html+=`<div style="display:flex;flex-direction:column;align-items:center;gap:1px;">${mkSp(cd.sp,2).outerHTML}<span style="font-size:7px;color:#f2c040;">${cd.n}</span></div>`;});
    html+=`</div>`;el.innerHTML=html;
  }else if(t==='stats'){
    const el=document.getElementById('fp-stats');
    const inv=Object.entries(S.inv).filter(([,v])=>v>0);
    const invV=inv.reduce((a,[id,cnt])=>a+Math.floor(iVal(id)*cnt*sellMult()),0);
    el.innerHTML=`<div class="mtit">📊 إحصائياتك</div>
    <div class="mcard">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;">
        ${[['📅',S.stats.days,'أيام'],['🧺',S.stats.harvested,'حصاد'],['💰',S.stats.earned,'ذهب'],['🏭',S.stats.crafted,'تصنيع'],['🐄',S.animals.length,'حيوانات'],['🏗',Object.keys(S.built).length,'مبانٍ']].map(([ic,v,n])=>`<div style="text-align:center;"><div style="font-size:20px;">${ic}</div><div style="font-size:16px;font-weight:900;color:#f2c040;">${v}</div><div style="font-size:8px;color:#6a4020;">${n}</div></div>`).join('')}
      </div>
    </div>
    <div class="mcard" style="margin-top:4px;">
      <div style="font-size:9px;color:#6a4020;margin-bottom:4px;font-weight:800;">المخزون الحالي (💰${invV})</div>
      ${inv.length?inv.map(([id,cnt])=>`<div style="display:flex;align-items:center;gap:4px;margin:2px 0;">${mkSp(iSp(id),2).outerHTML}<span style="font-size:9px;color:#f0e8c0;">${iName(id)} ×${cnt}</span></div>`).join(''):'<div style="font-size:9px;color:#6a4020;text-align:center;padding:4px;">فارغ</div>'}
    </div>`;
  }
}
